<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>网吧2003</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:SimSun,FangSong,sans-serif;overflow:hidden;width:100vw;height:100vh;position:fixed}
#g{width:1280px;height:720px;margin:0 auto;position:relative;overflow:hidden;background:#0a0a0a}
/* Title */
#t{position:absolute;inset:0;z-index:10;background:linear-gradient(180deg,#0a1628 0%,#0d1f35 50%,#102540 100%);display:flex;flex-direction:column;align-items:center;justify-content:center}
#t h1{font-size:68px;color:#4af;letter-spacing:14px;text-shadow:0 0 30px rgba(68,170,255,0.6);margin:0 0 6px}
#t p{font-size:18px;color:#8ab;letter-spacing:8px;margin:0 0 40px}
#t a{display:inline-block;padding:16px 52px;font-size:22px;letter-spacing:6px;color:#fff;background:rgba(68,170,255,0.25);border:2px solid rgba(68,170,255,0.6);border-radius:8px;cursor:pointer;text-decoration:none;font-family:inherit}
#t a:active{background:rgba(68,170,255,0.5);border-color:#4af;box-shadow:0 0 30px rgba(68,170,255,0.5)}
#t .tag{position:absolute;bottom:50px;font-size:14px;color:rgba(255,255,255,0.45);letter-spacing:3px}
/* Scene */
#s{position:absolute;inset:0;display:none;background:#1a1815}
#bg{position:absolute;inset:0;background:url('images/backgrounds/网吧白天.jpg') center/cover no-repeat}
#bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.3)}
#crt{position:absolute;inset:0;pointer-events:none;z-index:50;display:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.04) 0px,rgba(0,0,0,0.04) 2px,transparent 2px,transparent 4px)}
#crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.3) 100%)}
/* Characters */
.c{position:absolute;cursor:pointer;z-index:5;display:flex;flex-direction:column;align-items:center;transition:transform 0.2s}
.c:hover{transform:translateY(-5px)}
.c .av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:rgba(255,255,255,0.85);border:2px solid rgba(255,255,255,0.2);box-shadow:0 0 16px rgba(0,0,0,0.5)}
.c .nm{font-size:11px;color:#fff;margin-top:4px;background:rgba(0,0,0,0.85);padding:3px 10px;border-radius:8px;white-space:nowrap}
.c.gone{opacity:0.25;pointer-events:none}
/* HUD */
#h{position:absolute;top:0;left:0;width:100%;height:32px;background:rgba(0,0,0,0.85);border-bottom:1px solid rgba(68,170,255,0.12);display:none;align-items:center;padding:0 12px;z-index:20;font-size:12px;color:#8ab;gap:14px}
#h b{color:#4af}
#h button{padding:3px 10px;font-size:11px;color:#8ab;background:rgba(68,170,255,0.06);border:1px solid rgba(68,170,255,0.12);border-radius:4px;cursor:pointer;font-family:inherit}
#h button:hover{background:rgba(68,170,255,0.18);color:#fff}
/* Dialogue */
#d{position:absolute;bottom:0;left:0;width:100%;min-height:130px;background:#000;border-top:2px solid rgba(68,170,255,0.3);z-index:30;display:none;padding:14px 28px}
#d .who{font-size:16px;color:#4af;font-weight:bold;margin-bottom:4px}
#d .txt{font-size:18px;color:#fff;line-height:1.7;min-height:30px}
#d .opts{display:flex;flex-direction:column;gap:6px;margin-top:8px}
#d .opt{padding:6px 16px;font-size:16px;color:#fff;background:rgba(68,170,255,0.1);border:1px solid rgba(68,170,255,0.2);border-radius:6px;cursor:pointer;display:inline-block;max-width:580px}
#d .opt:hover{background:rgba(68,170,255,0.25);color:#fff}
#d .arw{position:absolute;bottom:16px;right:30px;font-size:13px;color:rgba(255,255,255,0.4)}
/* QQ */
#q{position:absolute;inset:0;display:none;z-index:40;background:url('images/backgrounds/夜晚网吧.jpg') center/cover no-repeat}
#q::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.7)}
#qw{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:860px;height:560px;background:rgba(255,255,255,0.97);border:2px solid #005aab;border-radius:8px 8px 0 0;display:flex;flex-direction:column;z-index:1}
#qb{height:28px;background:linear-gradient(180deg,#1a80d8,#005aab);border-radius:6px 6px 0 0;display:flex;align-items:center;padding:0 10px;gap:6px}
#qb i{width:14px;height:14px;background:#fff;border-radius:3px;font-size:9px;color:#005aab;display:flex;align-items:center;justify-content:center;font-style:normal}
#qb span{font-size:12px;color:#fff;flex:1}
#qb s{width:16px;height:16px;background:rgba(255,255,255,0.15);border-radius:3px;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none}
#qs{width:190px;background:#f0f4f8;border-right:1px solid #d0d8e0;padding:10px;overflow-y:auto;font-size:12px}
#qs .me{display:flex;align-items:center;gap:6px;padding:6px;background:#e8eef4;border-radius:6px;margin-bottom:10px}
#qs .ma{width:30px;height:30px;border-radius:6px;background:#8ab;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
#qs .mn{font-weight:bold;color:#333}
#qs .ms{font-size:10px;color:#6a6}
#qs .fr{padding:6px;display:flex;align-items:center;gap:6px;border-radius:4px;background:#d0e0f0}
#qs .fa{width:22px;height:22px;border-radius:50%;background:#6af;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
#qs .fd{width:6px;height:6px;background:#4a4;border-radius:50%;margin-left:auto}
#qc{flex:1;display:flex;flex-direction:column;background:#fafcfe}
#ql{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.qm{max-width:62%;padding:6px 12px;border-radius:12px;font-size:13px;line-height:1.5;animation:qi 0.3s}
@keyframes qi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.qm.ot{background:#e8eef4;color:#222;align-self:flex-start}.qm.me{background:#b0d4f0;color:#111;align-self:flex-end}
.qm .tm{font-size:8px;color:#999;margin-top:2px;text-align:right;display:block}
.qm.ty{background:#e0e8f0;color:#888;font-style:italic}
#qi{height:90px;border-top:1px solid #d0d8e0;padding:8px;display:flex;flex-direction:column;gap:5px}
#qi .tb{font-size:11px;color:#888}
.qcs{display:flex;gap:5px;flex-wrap:wrap}
.qc{padding:3px 10px;font-size:12px;color:#1a80d8;background:#e8f0f8;border:1px solid #b0d0e8;border-radius:10px;cursor:pointer;font-family:inherit}
.qc:hover{background:#d0e4f4}
#qi textarea{flex:1;border:1px solid #c0c8d0;border-radius:6px;padding:5px 10px;font-size:13px;font-family:inherit;resize:none;outline:none}
#qi textarea:focus{border-color:#005aab}
#qi .snd{align-self:flex-end;padding:4px 16px;background:#1a80d8;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-family:inherit}
/* Board */
#b{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center}
#b .in{width:760px;min-height:420px;background:#3a3020;border:6px solid #5a4a30;border-radius:4px;padding:24px;position:relative}
#b h2{text-align:center;color:#d4c4a0;font-size:20px;letter-spacing:4px;margin-bottom:16px}
#b .g{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
#b .cd{width:140px;padding:8px;background:#f4e8c0;border:1px solid #c0b080;font-size:11px;text-align:center;cursor:pointer;position:relative;box-shadow:2px 2px 6px rgba(0,0,0,0.3)}
#b .cd .pn{position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:#d44;border-radius:50%}
#b .cd.lk{background:#c0b8a0;color:#888;cursor:not-allowed}
#b .cd.lk::after{content:'?';font-size:22px;color:#999}
#b .cls{position:absolute;top:6px;right:12px;font-size:18px;color:#a09070;cursor:pointer;background:none;border:none;font-family:inherit}
#b .cls:hover{color:#fff}
/* Toast + Transition */
#to{position:absolute;top:44px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffc864;padding:6px 20px;border-radius:20px;font-size:13px;z-index:70;display:none;border:1px solid rgba(255,200,100,0.2)}
#tr{position:absolute;inset:0;z-index:55;background:url('images/backgrounds/夜晚网吧.jpg') center/cover no-repeat;display:none;align-items:center;justify-content:center;flex-direction:column}
#tr::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.75)}
#tr>*{position:relative;z-index:1;color:#c8d8e8;font-size:18px;letter-spacing:4px}
#tr .tm{font-size:44px;color:#4af;text-shadow:0 0 20px rgba(68,170,255,0.5);margin-bottom:6px}
@media(max-width:1300px){#g{width:100vw;height:56.25vw;max-height:100vh}#qw{width:90vw;height:80vh}}
</style></head><body>
<div id="g">
  <div id="t"><h1>网吧2003</h1><p>W A N G B A &nbsp; 2 0 0 3</p><a href="#" id="sb">开 始 游 戏</a><div class="tag">「有些对话，等了二十年才被听见」</div></div>
  <div id="s"><div id="bg"></div><div id="crt"></div><div id="cs"></div><div id="h">第<b id="dd">1</b>天 | ¥<b id="dm">500</b> | 线索<b id="dk">0</b>/9<button onclick="tb()">📋 线索板</button><button onclick="sv()">💾 存档</button><button onclick="ld()">📂 读档</button><button onclick="tM()" id="mb" style="color:#8f8">🎵 BGM</button><button onclick="gn()" style="color:#f8c864;border-color:rgba(255,200,100,0.3)">🌙 打烊</button></div><div id="d"><div class="who"></div><div class="txt"></div><div class="opts"></div><div class="arw">▼ 点击 / 空格</div></div></div>
  <div id="q"><div id="qw"><div id="qb"><i>Q</i><span>QQ2003 — 与 陌生人 聊天中</span><s>_</s><s>□</s><s onclick="eQ()">✕</s></div><div style="flex:1;display:flex;border-top:1px solid #ddd"><div id="qs"><div class="me"><div class="ma">我</div><div><div class="mn">网吧老板</div><div class="ms">在线</div></div></div><div class="fr"><div class="fa">?</div>陌生人<div class="fd"></div></div></div><div id="qc"><div id="ql"></div><div id="qi"><div class="tb">😊 表情 | 📎 文件 | 🎵 音乐</div><div class="qcs"></div><textarea rows="2" placeholder="输入消息..."></textarea><button class="snd" onclick="sQ()">发送</button></div></div></div></div></div>
  <div id="b"><div class="in"><h2>🔍 线索收集板</h2><div class="g"></div><button class="cls" onclick="tb()">✕</button></div></div>
  <div id="to"></div><div id="tr"></div>
</div>
<audio id="bg" loop preload="auto" src="Quiet_Room_At_Three(1).mp3"></audio>
<script>
// ============================================================
// 网吧2003 — COMPLETE GAME ENGINE
// ============================================================

// === ELEMENT CACHE (built once for speed) ===
var E={};
(function(){
  var ids=['g','t','s','h','d','q','b','to','tr','cs','bg','crt','sb','dd','dm','dk','ql','mb','qqcs'];
  for(var i=0;i<ids.length;i++){
    E[ids[i]]=document.getElementById(ids[i])||document.querySelector('#'+ids[i]+',.'+ids[i]);
  }
})();

// === AUDIO ===
var bgm=document.getElementById('bg')||{play:function(){},pause:function(){},volume:0.25};
try{bgm.volume=0.22}catch(e){}
function tM(){
  var b=E.mb;
  try{if(bgm.paused||bgm.ended){bgm.play();b.style.color='#8f8';b.textContent='🎵 BGM';toast('🎵 音乐：开')}else{bgm.pause();b.style.color='#f88';b.textContent='🔇 静音';toast('🔇 音乐：关')}}catch(e){}
}

// === STATE ===
var S={day:1,money:500,kw:[],inv:[],fl:{},q:[],cb:null,ti:null,tm:'morning',mu:true};
var C={
  lo:{id:'lo',n:'老李',c:'#8B7355',ix:'李',x:38,y:48,am:1,pm:1},
  xl:{id:'xl',n:'小林',c:'#6B8E23',ix:'林',x:48,y:42,am:1,pm:1},
  af:{id:'af',n:'阿芳',c:'#C04060',ix:'芳',x:68,y:38,am:1,pm:1},
  ws:{id:'ws',n:'王叔',c:'#5A7A9A',ix:'王',x:30,y:40,am:1,pm:1},
  xz:{id:'xz',n:'小周',c:'#D08090',ix:'周',x:58,y:52,am:1,pm:1},
  ch:{id:'ch',n:'陈警官',c:'#3A5A3A',ix:'陈',x:72,y:44,am:1,pm:1},
  st:{id:'st',n:'石头',c:'#6A6A6A',ix:'石',x:50,y:56,am:1,pm:1},
  my:{id:'my',n:'梅姨',c:'#7A6A8A',ix:'梅',x:36,y:56,am:1,pm:1},
  aj:{id:'aj',n:'阿杰',c:'#4A5A5A',ix:'杰',x:10,y:58,am:1,pm:1}
};
var K={
  'd1':{n:'1999.12.31',d:'火车票上的日期——1999年除夕夜。',u:0},
  'd4':{n:'失踪的第四个人',d:'不止一人提到不存在的朋友。',u:0},
  'du':{n:'舅舅知道',d:'舅舅生前似乎知道一切。',u:0},
  'ds':{n:'替身',d:'有人在使用假身份。',u:0},
  'dn':{n:'网吧不会空',d:'深夜看店听到键盘声。',u:0},
  'dm':{n:'TA不是我',d:'你是不是以为我是……',u:0},
  'dq':{n:'公用QQ',d:'不止一个人在登录那个号。',u:0},
  'df':{n:'火灾',d:'1999年除夕夜的网吧。',u:0},
  'dc':{n:'气氛组合同',d:'香烟纸上的永久合同。',u:0}
};

// === HELPERS ===
function toast(m){E.to.textContent=m;E.to.style.display='block';setTimeout(function(){E.to.style.display='none'},2500)}
function uh(){E.dd.textContent=S.day;E.dm.textContent=S.money;E.dk.textContent=S.kw.length}
function uk(id){if(S.kw.indexOf(id)<0){S.kw.push(id);K[id]&&(K[id].u=1);toast('🔑 新线索：'+K[id].n);uh()}}
function el(id){return document.getElementById(id)}

// === RENDER ===
function rc(){
  var tm=S.tm,w=E.g.clientWidth,h=E.g.clientHeight,html='';
  for(var k in C){var c=C[k];if(!c[tm==='morning'?'am':'pm'])continue;
    html+='<div class="c" style="left:'+(c.x*w/100-28)+'px;top:'+(c.y*h/100-28)+'px;" onclick="tk(\''+c.id+'\')"><div class="av" style="background:'+c.c+';">'+c.ix+'</div><div class="nm">'+c.n+'</div></div>';}
  E.cs.innerHTML=html;
}

// === DIALOGUE ===
var DW={w:'',txt:''};
function rn(id){var s=SC[id];if(s)s();E.d.style.display='block';if(S.q.length){nx()}}
function sy(w,t){S.q.push({w:w,t:t})}
function nx(){
  E.d.querySelector('.arw').style.display='none';
  if(S.ti){clearTimeout(S.ti);S.ti=null;if(S.q.length>0){DW.txt=S.q[0].t;E.d.querySelector('.txt').textContent=DW.txt;return}}
  S.q.shift();E.d.querySelector('.opts').innerHTML='';
  if(S.q.length===0){if(S.cb){var c=S.cb;S.cb=null;c()}return}
  E.d.querySelector('.arw').style.display='block';
  E.d.querySelector('.who').textContent=S.q[0].w;
  DW.txt='';tp(S.q[0].t,0);
}
function tp(t,i){if(i===0){DW.txt='';E.d.querySelector('.txt').textContent='';}if(i<t.length){DW.txt+=t[i];E.d.querySelector('.txt').textContent=DW.txt;S.ti=setTimeout(function(){tp(t,i+1)},20)}}
function op(arr){var o=E.d.querySelector('.opts');o.innerHTML='';arr.forEach(function(a){var d=document.createElement('div');d.className='opt';d.textContent=a.t;d.onclick=function(e){e.stopPropagation();o.innerHTML='';if(a.f)S.fl[a.f]=1;if(a.k)uk(a.k);if(a.s)rn(a.s);else if(a.a)a.a()};o.appendChild(d)})}

E.d.addEventListener('click',function(e){if(e.target.className==='opt')return;if(S.ti){clearTimeout(S.ti);S.ti=null;if(S.q.length>0){E.d.querySelector('.txt').textContent=S.q[0].t;return}}nx()});
document.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='Enter'){
    if(E.b.style.display==='flex')return;
    if(E.q.style.display==='block')return;
    e.preventDefault();
    if(S.ti){clearTimeout(S.ti);S.ti=null;if(S.q.length>0){E.d.querySelector('.txt').textContent=S.q[0].t;return}}
    nx();
  }
});

function tk(id){
  var c=C[id],fk='met_'+id,dk='deep_'+id,ck='cnt_'+id;
  S.fl[fk]=1;S.fl[ck]=(S.fl[ck]||0)+1;
  var cnt=S.fl[ck],sc;
  if(cnt===1)sc='t_'+id+'_1';
  else if(cnt===3&&!S.fl[dk]){S.fl[dk]=1;sc='t_'+id+'_d'}
  else if(cnt>=5&&S.fl[dk])sc='t_'+id+'_r';
  else sc='t_'+id+'_n';
  if(SC[sc])rn(sc);
  rc();
}

// === PHASE TRANSITIONS ===
function ga(){
  E.d.style.display='none';
  S.tm='afternoon';rc();
  var ns='day'+S.day+'_afternoon';
  if(SC[ns])rn(ns);else gn();
}
// === NIGHT ===
function gn(){
  E.d.style.display='none';E.tr.style.display='flex';
  E.tr.innerHTML='<div class="tm">23:47</div><div>网吧打烊，登录QQ...</div>';
  setTimeout(function(){E.tr.style.display='none';E.s.style.display='none';sQq()},2200);
}

// === QQ ===
var qI=0,qC=null;
function sQq(){
  E.q.style.display='block';E.ql.innerHTML='';
  var cs=document.querySelector('.qcs');if(cs)cs.innerHTML='';
  qI=0;qC=QQ['day'+S.day]||QQ.day1;
  qa('sys','—— 登录成功 ——');setTimeout(qn,600);
}
function qn(){
  if(!qC||qI>=qC.length){
    setTimeout(function(){qa('sys','—— 对方已下线 ——');setTimeout(function(){qop([{t:'关掉电脑，去睡觉',a:eQ}])},1000)},400);return;
  }
  var m=qC[qI];qI++;
  if(m.cd&&!m.cd()){setTimeout(qn,50);return;}
  if(m.s==='s'){
    qa('ty','对方正在输入...');
    setTimeout(function(){var l=E.ql.lastChild;if(l&&l.classList.contains('ty'))l.remove();qa('ot',m.t);if(m.c)qop(m.c);else setTimeout(qn,1000)},800+Math.random()*1000);
  }else if(m.s==='p'){qa('me',m.t);setTimeout(qn,500)}
  else{qa('sys',m.t);setTimeout(qn,400)}
}
function qa(tp,tx){
  var d=document.createElement('div');
  if(tp==='ot'){d.className='qm ot';d.innerHTML=tx+'<span class="tm">'+qt()+'</span>'}
  else if(tp==='me'){d.className='qm me';d.innerHTML=tx+'<span class="tm">'+qt()+'</span>'}
  else if(tp==='ty'){d.className='qm ty';d.textContent=tx}
  else{d.style.cssText='text-align:center;font-size:10px;color:#aaa;padding:3px';d.textContent=tx}
  E.ql.appendChild(d);E.ql.scrollTop=E.ql.scrollHeight;
}
function qop(arr){var o=document.querySelector('.qcs');o.innerHTML='';arr.forEach(function(a){var b=document.createElement('div');b.className='qc';b.textContent=a.t;b.onclick=function(){o.innerHTML='';if(a.f)S.fl[a.f]=1;if(a.k)uk(a.k);qa('me',a.t);if(a.ni!==undefined)qI=a.ni;setTimeout(qn,500)};o.appendChild(b)})}
function qt(){var h=23-Math.floor(Math.random()*3),m=Math.floor(Math.random()*60);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}
function sQ(){var t=document.querySelector('#qi textarea').value.trim();if(!t)return;qa('me',t);document.querySelector('#qi textarea').value='';setTimeout(function(){qa('ot','……');setTimeout(qn,800)},1000)}
function eQ(){
  E.q.style.display='none';E.ql.innerHTML='';E.s.style.display='block';
  S.day++;if(S.day>=5&&S.kw.length>=3)uk('dn');if(S.day>7){S.day=7;cE()}uh();
  E.tr.style.display='flex';
  E.tr.innerHTML='<div class="tm">0'+(6+Math.floor(Math.random()*3))+':'+String(Math.floor(Math.random()*60)).padStart(2,'0')+'</div><div>第'+S.day+'天</div>';
  setTimeout(function(){E.tr.style.display='none';S.tm='morning';rn('day'+S.day+'_am')},2500);
}

// === DAY 1 ===
'day1_am':function(){db(function(){op([{t:'环顾四周，观察这家网吧',s:'d1_look'},{t:'走向柜台，翻看账本',s:'d1_ctr'}])});
sy('旁白','2003年，初秋。你推开玻璃门。招牌上写着"星际网吧"——你舅舅起的名字。泡面味、淡淡烟味、CRT显示器的电流声一起扑面而来——日光灯嗡嗡地响。墙上的钟停在11:59。1999年12月31日。');

'd1_ledger':function(){db(function(){op([{t:'回大厅',s:'d1_look'}])});sy('旁白','账本很薄。每天的收入刚够电费和网费。但有一个地方不太对劲——每月15号都有一笔"工资支出"：200元×9人。你从没见过这些员工。');sy('旁白','账本最后一页有舅舅的字迹："这些人都挺好的。让他们留着。反正也没别的地方可去。——1999年11月"');},
'd1_noodle':function(){db(function(){op([{t:'回大厅',s:'d1_look'}])});sy('旁白','泡面整齐到不自然。红烧牛肉味在最左边，鲜虾鱼板面在最右边。架子最底层压着一张纸条：\n"石头——今天别忘了进货。——舅。"\n日期：2002年。舅舅去世前一个月。');},

'day2_afternoon':function(){db(function(){op([{t:'和扫雷的中年男人聊聊（陈警官）',s:'t_ch_1'},{t:'和找不到鼠标的老人聊聊（王叔）',s:'t_ws_1'},{t:'和安静的年轻女孩聊聊（小周）',s:'t_xz_1'},{t:'深夜打烊',a:gn}])});S.tm='afternoon';rc();sy('旁白','下午。一个穿便衣的男人径直走到最边上的电脑前——"巡逻。"但他打开的是扫雷。一个戴老花镜的老人推开门，站在门口愣了一下，像第一次来——但每个常客都认识他。一个年轻女孩下班后安静地走进来——她把这里叫做"唯一能待久一点的地方"。');},

'd3_stone':function(){db(function(){op([{t:'（沉默——背脊发凉）',s:'d3_drawer',k:'d1'}])});sy('石头','你又来了。');sy('你','我想问问——1999年的事。');sy('石头','（枪声停了。他摘下耳机。）那年除夕。大家都在。你舅舅也在。然后就没了。不是人没了——是那天以后的所有照片，都没有11:59以后的了。');},

'day3_afternoon':function(){db(function(){op([{t:'去问梅姨那张照片的事',s:'d3_mei'},{t:'仔细观察阿杰',s:'t_aj_d'},{t:'深夜打烊',a:gn}])});S.tm='afternoon';rc();sy('旁白','下午。阿杰睁开了眼睛。他在看你。那种目光不像在观察一个人——更像在等你开口说出某句话。');},

't_af_1':function(){S.fl.met_af=1;db(function(){op([{t:'"他是什么样的人？"',s:'af_uc'},{t:'"你继续忙，不打扰。"',s:'day1_afternoon'}])});sy('你','你好——');sy('阿芳','新老板。（没有转头。屏幕上的服装批发网页很久没滚动过。）我叫阿芳。隔壁开服装店的。午休来坐一会儿。');sy('你','生意怎么样？');sy('阿芳','还行。（"还行"这两个字说得非常匀速。像回答了几千遍。）你舅舅以前也天天问。我说还行，他说那就好。重复了大概一千遍。');},
'af_uc':function(){db(function(){op([{t:'（安静地走开）',s:'day1_afternoon'}])});sy('阿芳','什么样的人……他是那种让你觉得"待在这里也行"的人。不催你走。不问你来做什么。他死后——这里还是那样。');},

'xl_uc':function(){db(function(){op([{t:'"……提到过。"（说谎）',s:'day1_afternoon'},{t:'"……没有。"',s:'day1_afternoon'}])});sy('小林','1999年。第一天开门我就来了。那天很冷。他在柜台煮泡面。问我要不要来一碗。我说不饿。他还是给我泡了一碗。……他没跟你提过我吧。');},
